name: Cucumber Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Allow only one concurrent Pages deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build, run tests, generate report
  # ─────────────────────────────────────────────
  test:
    name: Run Tests & Generate Cucumber Report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Google Chrome is available
        run: google-chrome --version

      - name: Run tests with mvn clean verify
        # continue-on-error so the report is still published on test failure
        continue-on-error: true
        run: |
          set -o pipefail
          mvn clean verify 2>&1 | tee /tmp/mvn-build.log

      - name: Show Maven log highlights
        if: always()
        run: |
          echo "=== BUILD result ==="
          grep -E "BUILD (SUCCESS|FAILURE)|ERROR|WARNING" /tmp/mvn-build.log | tail -20 || true
          echo "=== Masterthought / cucumber-reporting mentions ==="
          grep -i "masterthought\|cucumber-reporting\|cucumber.html\|generate-cucumber-report\|outputDirectory\|htmlreport" /tmp/mvn-build.log || echo "No Masterthought mentions found"
          echo "=== target contents after verify ==="
          ls -la target/ 2>/dev/null || echo "target/ not found"
          echo "=== cucumber-html-reports dir ==="
          ls -la target/cucumber-html-reports/ 2>/dev/null || echo "target/cucumber-html-reports/ does not exist"
          echo "=== cucumber.json exists? ==="
          ls -lh target/cucumber.json 2>/dev/null || echo "No cucumber.json"

      - name: Upload Maven build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-log
          path: /tmp/mvn-build.log
          retention-days: 7

      - name: Upload Cucumber JSON report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-report
          path: target/cucumber.json
          retention-days: 30

      - name: Prepare Pages site content
        if: always()
        run: |
          rm -rf pages-site
          mkdir -p pages-site

          if [ -f target/cucumber-html-reports/index.html ]; then
            echo "Using target/cucumber-html-reports/index.html"
            cp -R target/cucumber-html-reports/. pages-site/
          elif [ -f target/cucumber-html-reports/cucumber-html-reports/overview-features.html ]; then
            echo "Using nested Masterthought report and creating root index.html"
            cp -R target/cucumber-html-reports/cucumber-html-reports/. pages-site/
            cat > pages-site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=overview-features.html">
            <title>Redirecting to Cucumber report...</title>
          </head>
          <body>
            <p>Redirecting to <a href="overview-features.html">overview-features.html</a>...</p>
          </body>
          </html>
          HTML
          elif [ -f target/cucumber-reports/index.html ]; then
            echo "Falling back to target/cucumber-reports/index.html"
            cp -R target/cucumber-reports/. pages-site/
          else
            echo "No HTML report found, creating diagnostic index.html"
            cat > pages-site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Cucumber report not found</title>
          </head>
          <body>
            <h1>Cucumber report not found</h1>
            <p>The workflow could not find a generated HTML report in expected locations.</p>
            <p>Check job logs and artifacts for details.</p>
          </body>
          </html>
          HTML
          fi

          echo "Pages site content:"
          ls -la pages-site

      - name: Upload Cucumber HTML report to Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site/

  # ─────────────────────────────────────────────
  # JOB 2: Publish report to GitHub Pages
  # ─────────────────────────────────────────────
  deploy:
    name: Publish Report to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Print report URL to job summary
        run: |
          echo "## Cucumber Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report published at:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Navigate to the URL above to view the full Masterthought Cucumber HTML report._" >> $GITHUB_STEP_SUMMARY
