name: Cucumber Selenium Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Allow only one concurrent Pages deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build, run tests, generate report
  # ─────────────────────────────────────────────
  test:
    name: Run Tests & Generate Cucumber Report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Google Chrome is available
        run: google-chrome --version

      - name: Run tests with mvn clean verify
        # continue-on-error so the report is still published on test failure
        continue-on-error: true
        run: mvn clean verify
        # CI=true is auto-set by GitHub Actions → hooks auto-enable headless mode

      - name: Generate Cucumber HTML report
        # Always run so the report is generated even when tests fail or mvn exits early
        if: always()
        run: |
          mvn net.masterthought:maven-cucumber-reporting:generate@generate-cucumber-report

      - name: Debug - list target directory
        if: always()
        run: |
          echo "=== target/ contents ==="
          ls -la target/ || echo "target/ not found"
          echo "=== target/cucumber-html-reports/ ==="
          ls -la target/cucumber-html-reports/ || echo "cucumber-html-reports/ not found"
          echo "=== cucumber.json size ==="
          wc -c target/cucumber.json || echo "cucumber.json not found"

      - name: Upload Cucumber JSON report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-report
          path: target/cucumber.json
          retention-days: 30

      - name: Upload Cucumber HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: target/cucumber-html-reports/
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 2: Publish report to GitHub Pages
  # ─────────────────────────────────────────────
  deploy:
    name: Publish Report to GitHub Pages
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      actions: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Cucumber HTML report artifact
        uses: actions/download-artifact@v4
        with:
          name: cucumber-html-report
          path: cucumber-html-reports/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload HTML report as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cucumber-html-reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print report URL to job summary
        run: |
          echo "## Cucumber Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report published at:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Navigate to the URL above to view the full Masterthought Cucumber HTML report._" >> $GITHUB_STEP_SUMMARY
